name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Metrics embed
        uses: lowlighter/metrics@v3.9
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: fay2220

          base: header, activity, community
          plugin_languages: yes
          plugin_isocalendar: yes
